<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ядовитое царство — интерактивный квест</title>
  <style>
    :root {
      --bg1: #fff6ef;
      --bg2: #ecd7c5;
      --bg3: #e5c6b7;
      --ink: #34231f;
      --muted: #7b6258;
      --gold: #b88845;
      --gold2: #d5ad70;
      --rose: #b96b6b;
      --jade: #5d7f73;
      --dark: #392722;
      --paper: rgba(255, 250, 240, 0.9);
      --paper2: rgba(255, 246, 233, 0.82);
      --shadow: rgba(52, 35, 31, 0.18);
      --danger: #8b3f3f;
      --safe: #607a66;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 225, 214, .85), transparent 34%),
        radial-gradient(circle at bottom right, rgba(177, 137, 85, .42), transparent 42%),
        linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      overflow-x: hidden;
    }

    .petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .petal {
      position: absolute;
      width: 10px;
      height: 18px;
      background: rgba(216, 146, 146, .34);
      border-radius: 80% 20% 80% 20%;
      animation: fall linear infinite;
    }

    @keyframes fall {
      from { transform: translateY(-10vh) rotate(0deg); opacity: .9; }
      to { transform: translateY(110vh) rotate(360deg); opacity: .08; }
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(1030px, 94vw);
      margin: 0 auto;
      padding: 34px 0 58px;
    }

    .hero, .card {
      background: var(--paper);
      border: 1px solid rgba(184, 136, 69, .38);
      box-shadow: 0 24px 70px var(--shadow);
      border-radius: 28px;
      backdrop-filter: blur(10px);
    }

    .hero {
      padding: clamp(24px, 5vw, 50px);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero:before, .hero:after {
      content: "";
      position: absolute;
      border: 1px solid rgba(184, 136, 69, .24);
      border-radius: 999px;
      width: 420px;
      height: 420px;
      pointer-events: none;
    }

    .hero:before { top: -260px; left: -150px; }
    .hero:after { bottom: -270px; right: -170px; }

    h1 {
      margin: 0;
      font-size: clamp(38px, 7vw, 78px);
      letter-spacing: .02em;
      line-height: .95;
    }

    .subtitle {
      margin: 18px auto 0;
      max-width: 760px;
      color: var(--muted);
      font-size: clamp(16px, 2.2vw, 21px);
      line-height: 1.55;
    }

    .mode-grid {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    button {
      border: 0;
      cursor: pointer;
      font-family: inherit;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .mode-btn, .choice-btn, .restart-btn, .copy-btn {
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(184, 136, 69, .94), rgba(147, 90, 66, .94));
      color: #fffaf0;
      padding: 18px 20px;
      box-shadow: 0 12px 30px rgba(139, 87, 56, .24);
      font-size: 17px;
      line-height: 1.35;
    }

    .mode-btn:hover, .choice-btn:hover, .restart-btn:hover, .copy-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(139, 87, 56, .32);
    }

    .mode-title { display: block; font-size: 23px; font-weight: 700; margin-bottom: 7px; }
    .mode-desc { display: block; opacity: .92; }

    .game { display: none; margin-top: 22px; }
    .game.active { display: block; }

    .card { padding: clamp(22px, 4vw, 40px); }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 15px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(184, 136, 69, .35);
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, .38);
    }

    .scene-title {
      font-size: clamp(26px, 4vw, 46px);
      line-height: 1.08;
      margin: 0 0 14px;
    }

    .scene-text {
      color: #4a3731;
      font-size: 19px;
      line-height: 1.62;
      margin: 0 0 22px;
      white-space: pre-line;
    }

    .small-note {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
      margin: -8px 0 18px;
      font-style: italic;
    }

    .choices {
      display: grid;
      gap: 12px;
    }

    .choice-btn {
      width: 100%;
      text-align: left;
      background: rgba(255, 250, 240, .9);
      color: var(--ink);
      border: 1px solid rgba(184, 136, 69, .42);
      box-shadow: 0 8px 24px rgba(52, 35, 31, .08);
      position: relative;
      overflow: hidden;
    }

    .choice-btn:before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(184,136,69,.13), transparent 42%);
      opacity: 0;
      transition: opacity .18s ease;
    }

    .choice-btn:hover {
      background: rgba(255, 244, 224, .98);
    }

    .choice-btn:hover:before { opacity: 1; }

    .choice-main {
      display: block;
      font-size: 18px;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    .choice-sub {
      display: block;
      color: var(--muted);
      margin-top: 4px;
      font-size: 14px;
      position: relative;
      z-index: 1;
    }

    .stats {
      margin: 18px 0 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .stat {
      padding: 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, .44);
      border: 1px solid rgba(184, 136, 69, .24);
      text-align: center;
    }

    .stat strong { display: block; font-size: 21px; }
    .stat span { color: var(--muted); font-size: 13px; }

    .result-title { font-size: clamp(30px, 5vw, 54px); margin: 0 0 12px; }
    .result-subtitle { font-size: 22px; color: var(--muted); margin: 0 0 20px; }
    .result-text { font-size: 19px; line-height: 1.65; color: #4a3731; white-space: pre-line; }
    .restart-btn, .copy-btn { margin-top: 18px; margin-right: 10px; }

    .quote {
      margin-top: 22px;
      padding: 18px 20px;
      border-left: 4px solid var(--gold);
      background: rgba(255, 255, 255, .42);
      border-radius: 16px;
      color: #5b443b;
      font-style: italic;
      line-height: 1.55;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin: 20px 0;
    }

    .result-box {
      border: 1px solid rgba(184, 136, 69, .32);
      background: rgba(255,255,255,.44);
      border-radius: 20px;
      padding: 16px;
    }

    .result-box b {
      display: block;
      color: var(--dark);
      margin-bottom: 6px;
      font-size: 18px;
    }

    .result-box span {
      color: #59433c;
      line-height: 1.5;
    }

    .bar-wrap {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 120px 1fr 36px;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .bar {
      height: 9px;
      background: rgba(184,136,69,.18);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar > i {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--rose));
      border-radius: inherit;
    }

    @media (max-width: 760px) {
      .mode-grid, .result-grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .bar-row { grid-template-columns: 96px 1fr 30px; }
    }
  </style>
</head>
<body>
  <div class="petals" id="petals"></div>

  <main class="wrap">
    <section class="hero" id="start">
      <h1>Ядовитое царство</h1>
      <p class="subtitle">Интерактивный квест: попробуй сыграть партию в фаофэ или выжить в семье Яо. Здесь не каждый красивый выбор — правильный.</p>
      <div class="mode-grid">
        <button class="mode-btn" onclick="startGame('faofe')">
          <span class="mode-title">♟️ Партия в фаофэ</span>
          <span class="mode-desc">15 ходов, скрытые ловушки, политические решения и несколько вариантов судьбы.</span>
        </button>
        <button class="mode-btn" onclick="startGame('yao')">
          <span class="mode-title">🐍 Выживешь ли ты в семье Яо?</span>
          <span class="mode-desc">15 испытаний, проверка характера, шанс выжить и узнать свою роль в ядовитом доме.</span>
        </button>
      </div>
      <div class="quote">«В основе любого плана лежит продуманная стратегия поведения»</div>
    </section>

    <section class="game" id="game">
      <div class="card">
        <div class="topline">
          <div class="badge" id="modeBadge">♟️ Партия</div>
          <div class="badge" id="stepBadge">Ход 1 / 15</div>
        </div>
        <h2 class="scene-title" id="sceneTitle"></h2>
        <p class="scene-text" id="sceneText"></p>
        <p class="small-note" id="smallNote"></p>
        <div class="choices" id="choices"></div>
        <div class="stats" id="visibleStats">
          <div class="stat"><strong id="sMind">0</strong><span>разум</span></div>
          <div class="stat"><strong id="sInfluence">0</strong><span>влияние</span></div>
          <div class="stat"><strong id="sSurvival">0</strong><span>выживание</span></div>
          <div class="stat"><strong id="sPoison">0</strong><span>яд</span></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const petals = document.getElementById('petals');
    for (let i = 0; i < 34; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = 8 + Math.random() * 12 + 's';
      p.style.animationDelay = -Math.random() * 12 + 's';
      p.style.transform = `rotate(${Math.random() * 360}deg)`;
      petals.appendChild(p);
    }

    const baseStats = {
      mind: 0,
      influence: 0,
      survival: 0,
      poison: 0,
      suspicion: 0,
      mercy: 0,
      ambition: 0,
      love: 0,
      loyalty: 0,
      chaos: 0,
      debt: 0,
      mask: 0
    };

    const games = {
      faofe: {
        badge: '♟️ Партия в фаофэ',
        note: 'Параметры видны не полностью: некоторые последствия откроются только в финале.',
        steps: [
          {
            title: 'Ход 1. Повреждённая струна',
            text: 'Перед выступлением ты замечаешь, что струна на инструменте слегка подпилена. Если сыграешь — возможен позор. Если откажешься — скажут, что ты испугалась.',
            choices: [
              ['Играть, но изменить мелодию', 'превратить ловушку в спектакль', { mind: 3, influence: 1, suspicion: 1, mask: 1 }],
              ['Публично показать повреждение', 'опасно, но честно', { influence: 2, suspicion: 2, chaos: 1 }],
              ['Незаметно поменять инструмент', 'тихий ход без славы', { survival: 2, mind: 1, mask: 1 }],
              ['Сыграть как есть', 'рискнуть ради впечатления', { influence: 1, survival: -1, chaos: 2 }]
            ]
          },
          {
            title: 'Ход 2. Чай для матери',
            text: 'Тебе шепнули, что в чай твоей матери могли что-то подмешать. Но записку могла прислать и врагиня, чтобы проверить тебя.',
            choices: [
              ['Поменять чашки местами', 'резко, опасно, почти вызов', { poison: 2, suspicion: 2, survival: 1 }],
              ['Уронить поднос случайно', 'никто ничего не докажет', { mind: 2, survival: 2, mask: 1 }],
              ['Показать записку Шао', 'получить помощь, но создать долг', { survival: 2, debt: 2, love: 1 }],
              ['Ничего не делать и наблюдать', 'иногда цена знания слишком высока', { mind: 3, mercy: -1, suspicion: -1 }]
            ]
          },
          {
            title: 'Ход 3. Служанка-шпионка',
            text: 'Ты узнаёшь, что одна из служанок передаёт сведения о тебе. Но она плачет: её младшего брата держат в заложниках.',
            choices: [
              ['Сделать её двойным агентом', 'самый стратегический ход', { mind: 3, poison: 1, influence: 1 }],
              ['Простить и отпустить', 'человечно, но небезопасно', { mercy: 3, survival: -1, suspicion: -1 }],
              ['Передать её старой мадам', 'законно, но жестоко', { influence: 2, poison: 1, mercy: -2 }],
              ['Подменить сведения ложью', 'пусть враг сам войдёт в ловушку', { mind: 2, poison: 2, mask: 1 }]
            ]
          },
          {
            title: 'Ход 4. Подарок с двойным дном',
            text: 'На праздник старой мадам можно подарить роскошь, символ, услугу или удар по чужой репутации. Все смотрят.',
            choices: [
              ['Тысячелетнее дерево с тайным смыслом', 'долгая жизнь, корни и власть', { mind: 2, influence: 2, mask: 1 }],
              ['Драгоценность дороже всех подарков', 'ослепить, но вызвать зависть', { influence: 3, suspicion: 2 }],
              ['Скромную вещь, сделанную руками', 'риск показаться слабой', { mercy: 2, influence: -1, survival: 1 }],
              ['Подарок, который обличает Инне Лин', 'красиво, но начинается война', { poison: 3, chaos: 2, suspicion: 2 }]
            ]
          },
          {
            title: 'Ход 5. Праздник Красных Лодок',
            text: 'Сёстры исчезают в толпе. Ты понимаешь: впереди будет скандал. Можно вмешаться, а можно позволить судьбе идти самой.',
            choices: [
              ['Наблюдать с крыши', 'видеть всё и не пачкать руки', { mind: 3, survival: 1, mask: 1 }],
              ['Остановить Юнь до позора', 'спасти врага от себя самой', { mercy: 2, survival: -1, influence: 1 }],
              ['Подтолкнуть Хеань к сцене', 'пусть идеальная маска треснет', { poison: 3, chaos: 2 }],
              ['Сообщить охране заранее', 'порядок важнее зрелища', { influence: 1, survival: 2, chaos: -1 }]
            ]
          },
          {
            title: 'Ход 6. Лодка Чжоу',
            text: 'Чжоу оказывается в уязвимом положении: одна ошибка — и его имя утонет в сплетнях. Ты можешь помочь или дать ему заплатить.',
            choices: [
              ['Спасти его репутацию ради будущего хода', 'не милость, а инвестиция', { mind: 2, influence: 1, debt: -1 }],
              ['Оставить его тонуть в слухах', 'пусть ест последствия', { poison: 2, mercy: -1, chaos: 1 }],
              ['Передать слухи нужным людям', 'столица сама всё сделает', { poison: 3, suspicion: 1 }],
              ['Сохранить молчание', 'не все карты играют сразу', { survival: 2, mask: 1 }]
            ]
          },
          {
            title: 'Ход 7. Шао знает слишком много',
            text: 'Шао намекает, что видел тебя там, где ты не должна была быть. Он улыбается так, будто уже знает ответ.',
            choices: [
              ['Сказать полуправду', 'лучший яд всегда разбавлен правдой', { mind: 2, love: 1, mask: 1 }],
              ['Солгать полностью', 'красиво, но он может заметить', { poison: 1, suspicion: 2 }],
              ['Признаться прямо', 'смелость или глупость?', { love: 2, survival: -1, mercy: 1 }],

          {

            text: 'На поле фаофэ нет королевы. Чжоу считает это слабостью игры. Но что, если именно отсутствие фигуры — главная ловушка?',
            choices: [
              ['Доказать, что королева уже есть', 'ты сама становишься центром партии', { ambition: 3, influence: 2 }],
              ['Сделать вид, что не поняла', 'недооценка — твоя броня', { mask: 2, survival: 2 }],
              ['Переиграть его через слабую фигуру', 'победа не всегда у сильных', { mind: 3, influence: 1 }],
              ['Пожертвовать важной фигурой', 'жестокий ход ради победы', { poison: 2, mercy: -2, ambition: 1 }]
            ]
          },
          {
            title: 'Ход 9. Наложница или принцесса',
            text: 'Тебе предлагают путь: формально безопасный, но унизительный. Другой путь опасен, но может вывести тебя из чужой власти.',
            choices: [
              ['Выбрать безопасность', 'жить, но не управлять', { survival: 3, ambition: -1 }],
              ['Выбрать статус', 'пусть все увидят новую фигуру', { influence: 3, suspicion: 2 }],
              ['Выбрать побег', 'свобода дороже титула', { survival: 2, loyalty: 2, influence: -1 }],
              ['Выбрать сделку с Шао', 'опасная опора', { love: 2, debt: 2, influence: 1 }]
            ]
          },
          {
            title: 'Ход 10. Тайна Гуандай',
            text: 'Ты случайно касаешься темы, о которой умные люди говорят только шёпотом. Знать слишком много — почти преступление.',
            choices: [
              ['Отступить и забыть', 'иногда незнание продлевает жизнь', { survival: 3, suspicion: -1 }],
              ['Собрать сведения через слухи', 'медленно, незаметно, опасно', { mind: 2, suspicion: 1 }],
              ['Спросить Шао прямо', 'ударить в центр', { love: 1, suspicion: 2, mind: 1 }],
              ['Использовать тайну как рычаг', 'очень коварно', { poison: 3, ambition: 2, suspicion: 3 }]
            ]
          },
          {
            title: 'Ход 11. Письмо без подписи',
            text: 'Тебе присылают письмо: «Сегодня ночью твою мать увезут». Это может быть правда, ловушка или проверка.',
            choices: [
              ['Бежать самой', 'сердце быстрее разума', { loyalty: 3, survival: -1, love: 1 }],
              ['Послать доверенного человека', 'не выходить из тени', { mind: 2, survival: 1 }],

              ['Подготовить встречную ловушку', 'если охотятся на тебя — охоться первой', { poison: 2, mind: 2 }]
            ]
          },
          {
            title: 'Ход 12. Публичная милость',
            text: 'Тебя неожиданно хвалят при всех. Это может быть награда, а может — способ сделать тебя мишенью.',
            choices: [
              ['Принять с безупречной скромностью', 'маска работает', { influence: 2, mask: 2 }],
              ['Разделить заслугу с другой', 'союз через щедрость', { mercy: 2, influence: 1 }],
              ['Отказаться от похвалы', 'слишком подозрительно', { suspicion: 1, survival: 1 }],
              ['Использовать момент для просьбы', 'смело и рискованно', { ambition: 2, influence: 2, suspicion: 1 }]
            ]
          },
          {
            title: 'Ход 13. Враг просит помощи',
            text: 'Тот, кто когда-то смеялся над тобой, теперь сам на коленях. Он просит спасти его от наказания.',

              ['Помочь и потребовать верность', 'милость как цепь', { mind: 2, influence: 2, mercy: 1 }],

              ['Сделать его виновным ещё сильнее', 'очень тёмный ход', { poison: 4, chaos: 2, mercy: -3 }]
            ]
          },
          {
            title: 'Ход 14. Сердце как слабость',

    let currentType = null;
    let currentGame = null;
    let stepIndex = 0;
    let stats = { ...baseStats };
    let historyLabels = [];

    function startGame(type) {
      currentType = type;
      currentGame = games[type];
      stepIndex = 0;
      stats = { ...baseStats };
      historyLabels = [];
      document.getElementById('start').style.display = 'none';
      document.getElementById('game').classList.add('active');
      renderStep();
    }

    function renderStep() {
      const step = currentGame.steps[stepIndex];
      document.getElementById('modeBadge').textContent = currentGame.badge;
      document.getElementById('stepBadge').textContent = `${stepIndex + 1} / ${currentGame.steps.length}`;
      document.getElementById('sceneTitle').textContent = step.title;
      document.getElementById('sceneText').textContent = step.text;
      document.getElementById('smallNote').textContent = currentGame.note;
      const choices = document.getElementById('choices');
      choices.innerHTML = '';
      step.choices.forEach(([label, sub, effect]) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = `<span class="choice-main">${label}</span><span class="choice-sub">${sub}</span>`;
        btn.onclick = () => choose(effect, label);
        choices.appendChild(btn);
      });
      renderStats();
    }

    function choose(effect, label) {
      historyLabels.push(label);
      Object.keys(effect).forEach(key => stats[key] += effect[key]);
      stepIndex++;
      if (stepIndex >= currentGame.steps.length) renderResult();
      else renderStep();
    }

    function renderStats() {
      document.getElementById('sMind').textContent = stats.mind;
      document.getElementById('sInfluence').textContent = stats.influence;
      document.getElementById('sSurvival').textContent = stats.survival;
      document.getElementById('sPoison').textContent = stats.poison;
    }

    function renderResult() {
      const gameEl = document.querySelector('#game .card');
      const result = currentType === 'faofe' ? getFaofeResult() : getYaoResult();
      const bars = makeBars();
      gameEl.innerHTML = `
        <h2 class="result-title">${result.title}</h2>
        <p class="result-subtitle">${result.subtitle}</p>
        <p class="result-text">${result.text}</p>

        <div class="result-grid">
          ${result.boxes.map(box => `<div class="result-box"><b>${box[0]}</b><span>${box[1]}</span></div>`).join('')}
        </div>

        <div class="bar-wrap">${bars}</div>

        <div class="quote">${result.quote}</div>
        <button class="restart-btn" onclick="restart()">Начать заново</button>
        <button class="copy-btn" onclick="copyResult()">Скопировать результат</button>
      `;
      window.lastResultText = `${result.title}\n${result.subtitle}\n\n${result.text}\n\n${result.boxes.map(b => b[0] + ': ' + b[1]).join('\n')}\n\n${result.quote}`;
    }

    function makeBars() {
      const keys = [
        ['mind', 'Разум'],
        ['influence', 'Влияние'],
        ['survival', 'Выживание'],
        ['poison', 'Яд'],
        ['ambition', 'Амбиции'],
        ['mercy', 'Милость']
      ];
      return keys.map(([key, label]) => {
        const val = Math.max(0, Math.min(20, stats[key] || 0));
        const pct = Math.min(100, Math.round((val / 20) * 100));
        return `<div class="bar-row"><span>${label}</span><div class="bar"><i style="width:${pct}%"></i></div><span>${val}</span></div>`;
      }).join('');
    }

      return {
        title: '♟️ Игрок второго круга',
        subtitle: 'Ты не проиграла. Но партия ещё не закончена.',
        text: 'Ты сделала достаточно сильных ходов, чтобы тебя заметили, но не настолько точных, чтобы сразу взять доску под контроль. Впрочем, в фаофэ побеждает не тот, кто громче начал, а тот, кто дожил до решающего хода.',
        boxes: [
          ['Судьба', 'опасная фигура с будущим'],
          ['Стиль игры', 'смешанный: осторожность, яд и импровизация'],
          ['Главный риск', 'не всегда ясная цель'],
          ['Шанс на победу', 'очень высокий, если следующий ход будет точнее']
        ],
        quote: '«Каждый сам кует свою судьбу. И несёт ответственность за свою же глупость»'
      };
    }

    function getYaoResult() {
      const survivalScore = stats.survival + stats.mind + stats.mask + stats.influence - stats.chaos - Math.max(0, stats.suspicion - 3);
      let alive = 'выжил';
      if (survivalScore < 8) alive = 'не выжил';
      else if (survivalScore < 15) alive = 'выжил, но слишком дорого';
      else if (survivalScore < 23) alive = 'выжил и стал опасной фигурой';
      else alive = 'выжил и изменил правила дома';

      const archetypes = [
        ['Фейлан', stats.mind + stats.survival + stats.loyalty + stats.mask],
        ['Шао Сенхан', stats.mind + stats.love + stats.influence + stats.suspicion],
        ['Инне Лин', stats.poison + stats.mask + stats.influence + stats.ambition],
        ['Юнь Яо', stats.poison + stats.chaos + stats.ambition],
        ['Хеань Яо', stats.mask + stats.influence + stats.suspicion],
        ['Старая мадам Яо', stats.mind + stats.influence + stats.survival + stats.mercy]
      ].sort((a,b) => b[1] - a[1]);

      const role = getRole();
      const person = archetypes[0][0];

      let title = '🐍 Ты пережил дом Яо';
      let subtitle = `Итог: ${alive}. Больше всего похож на: ${person}.`;

      if (alive === 'не выжил') {
        title = '❌ Дом Яо тебя сломал';
      } else if (alive === 'выжил, но слишком дорого') {
        title = '⚠️ Ты выжил, но оставил часть себя в этом доме';
      } else if (alive === 'выжил и стал опасной фигурой') {
        title = '🐍 Ты стал опасной фигурой';
      } else {
        title = '👑 Ты изменил правила дома Яо';
      }

      const explanation = {
        'Фейлан': 'Ты держишься тише других, но именно поэтому видишь больше. Твоя сила — наблюдательность, память и умение выживать без лишнего шума.',
        'Шао Сенхан': 'Ты опасно проницателен: умеешь улыбаться, задавать неудобные вопросы и видеть чужие трещины раньше, чем они станут заметны.',
        'Инне Лин': 'Ты слишком хорошо понимаешь власть маски. Твоя вежливость может быть красивой, но рядом с ней всегда пахнет ядом.',
        'Юнь Яо': 'Ты действуешь резко, страстно и не всегда осторожно. Зато в тебе есть напор, который невозможно не заметить.',
        'Хеань Яо': 'Ты умеешь держать лицо и понимаешь цену репутации. Но идеальность становится опасной клеткой, если внутри копятся злость и страх.',
        'Старая мадам Яо': 'Ты выбираешь долгую игру. Твоя сила — не в крике, а в авторитете, терпении и умении дождаться нужного момента.'
      }[person];

      let text = '';
      if (alive === 'не выжил') {
        text = 'Ты слишком рано стал заметен, слишком резко отвечал или слишком долго верил, что справедливость здесь работает сама по себе. В доме Яо такие ошибки не прощают.';
      } else if (alive === 'выжил, но слишком дорого') {
        text = 'Ты прошёл через ядовитый дом, но не без потерь. Где-то пришлось промолчать, где-то — предать себя, где-то — выбрать безопасность вместо гордости.';
      } else if (alive === 'выжил и стал опасной фигурой') {
        text = 'Ты понял главное: в семье Яо нельзя просто быть хорошим. Нужно быть внимательным, нужным и немного опасным. Теперь с тобой считаются.';
      } else {
        text = 'Ты не просто выжил. Ты научился двигать чужие страхи, желания и ошибки так, будто это фигуры на доске. Дом Яо больше не может обращаться с тобой как с пустым местом.';
      }

      return {
        title,
        subtitle,
        text,
        boxes: [
          ['Выживаемость', alive],
          ['Больше всего похож на', person + '. ' + explanation],
          ['Возможная должность', role],
          ['Главная черта', getTrait()]
        ],
        quote: getYaoQuote(person, alive)
      };
    }

    function getRole() {
      const options = [
        ['Глава внутреннего двора', stats.influence + stats.mask + stats.mind],
        ['Теневой стратег принца', stats.mind + stats.love + stats.suspicion],
        ['Мастер слухов и тайных писем', stats.poison + stats.mind + stats.mask],
        ['Хранитель семейных архивов', stats.mind + stats.survival + stats.mercy],
        ['Ядовитый советник', stats.poison + stats.influence + stats.ambition],
        ['Идеальная придворная маска', stats.mask + stats.influence],
        ['Тайный исполнитель', stats.poison + stats.survival + stats.suspicion],
        ['Человек, которого все недооценили', stats.survival + stats.mind + stats.loyalty]
      ].sort((a,b) => b[1] - a[1]);
      return options[0][0];
    }

    function getTrait() {
      const traits = [
        ['холодная наблюдательность', stats.mind],
        ['умение выживать', stats.survival],
        ['красивая опасность', stats.poison],
        ['желание власти', stats.ambition],
        ['верность своим', stats.loyalty],
        ['маска безупречности', stats.mask],
        ['милость там, где её не ждут', stats.mercy],
        ['влияние без крика', stats.influence]
      ].sort((a,b) => b[1] - a[1]);
      return traits[0][0];
    }

    function getYaoQuote(person, alive) {
      if (alive === 'не выжил') return '«Порой исполнение желаемого оказывается для нас худшим наказанием»';
      if (person === 'Инне Лин') return '«В доме, где улыбки бывают ядовиты, одиночество — худшая защита»';
      if (person === 'Фейлан') return '«У тебя есть силы. Подняться, когда падаешь…»';
      if (person === 'Шао Сенхан') return '«Спокойствие было редким благом. Истинное спокойствие являлось штилем перед штормом»';
      return '«Каждый сам кует свою судьбу. И несёт ответственность за свою же глупость»';
    }

    function copyResult() {
      navigator.clipboard.writeText(window.lastResultText || '').then(() => {
        alert('Результат скопирован!');
      });
    }

    function restart() {
      location.reload();
    }
  </script>
</body>
</html>
